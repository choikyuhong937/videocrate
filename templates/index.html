<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TripVideo</title>
    <style>
        :root {
            --bg: #0a0a0f; --surface: #151520; --surface2: #1c1c2c;
            --border: #282840; --text: #eeeef4; --dim: #7878a0;
            --accent: #7c6aef; --accent-l: #a594ff; --accent-bg: rgba(124,106,239,0.12);
            --green: #4ade80; --red: #f87171;
            --grad: linear-gradient(135deg, #7c6aef 0%, #c084fc 100%);
            --safe-b: env(safe-area-inset-bottom, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, 'Pretendard', system-ui, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; min-height:100dvh; overflow-x:hidden; }
        .app { max-width:480px; margin:0 auto; padding:20px 16px; padding-bottom:calc(20px + var(--safe-b)); min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
        .screen { display:none; flex:1; flex-direction:column; }
        .screen.active { display:flex; }

        /* ── Logo ── */
        .brand { text-align:center; padding:32px 0 8px; }
        .brand-icon { font-size:40px; margin-bottom:8px; }
        .brand h1 { font-size:24px; font-weight:700; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .brand p { color:var(--dim); font-size:13px; margin-top:6px; line-height:1.5; }

        /* ── Card ── */
        .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:16px; }

        /* ── Form ── */
        .form-group { margin-bottom:16px; }
        .form-label { font-size:12px; font-weight:600; color:var(--dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; display:block; }
        .form-input { width:100%; padding:14px 16px; background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-size:16px; outline:none; transition:border 0.2s; }
        .form-input:focus { border-color:var(--accent); }
        .form-input::placeholder { color:var(--dim); font-size:14px; }
        .form-hint { font-size:11px; color:var(--dim); margin-top:5px; }
        .form-hint a { color:var(--accent-l); text-decoration:none; }
        .form-hint.ok { color:var(--green); }
        .form-hint.err { color:var(--red); }
        .input-wrap { position:relative; }
        .input-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--dim); font-size:18px; cursor:pointer; padding:4px; }

        /* ── Buttons ── */
        .btn { width:100%; padding:16px; background:var(--grad); border:none; border-radius:12px; color:#fff; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.2s; -webkit-appearance:none; }
        .btn:active:not(:disabled) { transform:scale(0.98); opacity:0.9; }
        .btn:disabled { opacity:0.4; cursor:default; }
        .btn-outline { background:var(--surface2); border:1.5px solid var(--border); color:var(--text); }
        .btn-outline:active:not(:disabled) { background:var(--border); }
        .btn-sm { padding:12px; font-size:14px; border-radius:10px; }
        .btn-row { display:flex; gap:10px; }
        .btn-row .btn { flex:1; }

        /* ── Upload zone (mobile) ── */
        .upload-zone { border:2px dashed var(--border); border-radius:12px; padding:36px 16px; text-align:center; cursor:pointer; transition:all 0.3s; }
        .upload-zone:active { border-color:var(--accent); background:var(--accent-bg); }
        .upload-zone.has-files { border-color:var(--green); border-style:solid; background:rgba(74,222,128,0.06); }
        .upload-zone h3 { font-size:15px; font-weight:500; margin-bottom:4px; }
        .upload-zone p { font-size:12px; color:var(--dim); }
        .upload-icon { font-size:36px; margin-bottom:10px; }
        .file-count { color:var(--green); font-weight:600; }
        input[type="file"] { display:none; }
        .preview-row { display:flex; gap:4px; margin-top:12px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px; }
        .preview-row img { width:56px; height:56px; object-fit:cover; border-radius:6px; flex-shrink:0; }
        .preview-more { width:56px; height:56px; border-radius:6px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--dim); flex-shrink:0; }

        /* ── Trip cards (mobile) ── */
        .trip-card { display:flex; align-items:center; gap:12px; padding:14px; border-radius:12px; background:var(--surface2); border:2px solid transparent; cursor:pointer; transition:all 0.2s; user-select:none; margin-bottom:10px; }
        .trip-card:active { opacity:0.85; }
        .trip-card.selected { border-color:var(--accent); background:var(--accent-bg); }
        .trip-thumb { width:56px; height:56px; border-radius:8px; object-fit:cover; flex-shrink:0; background:var(--border); }
        .trip-thumb-empty { width:56px; height:56px; border-radius:8px; flex-shrink:0; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:22px; }
        .trip-info { flex:1; min-width:0; }
        .trip-name { font-size:15px; font-weight:600; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .trip-meta { font-size:12px; color:var(--dim); }
        .trip-check { width:24px; height:24px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; color:transparent; transition:all 0.2s; }
        .trip-card.selected .trip-check { border-color:var(--accent); background:var(--accent); color:#fff; }
        .section-title { font-size:16px; font-weight:600; margin-bottom:14px; }

        /* ── Settings (mobile 2col) ── */
        .settings { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
        .settings .form-group { margin-bottom:0; }
        .settings select { width:100%; padding:12px; background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; -webkit-appearance:none; appearance:none; }

        /* ── Spinner ── */
        .spinner { width:14px; height:14px; border:2px solid var(--accent-bg); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
        .spinner-lg { width:36px; height:36px; border-width:3px; margin:0 auto 14px; display:block; }
        @keyframes spin { to { transform:rotate(360deg) } }
        .loading-view { text-align:center; padding:40px 0; }
        .loading-view p { color:var(--dim); font-size:13px; }

        /* ── Progress steps ── */
        .step { display:flex; align-items:center; gap:12px; padding:10px 0; }
        .step-dot { width:28px; height:28px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:12px; background:var(--surface2); transition:all .3s; }
        .step.active .step-dot { border-color:var(--accent); background:var(--accent-bg); }
        .step.done .step-dot { border-color:var(--green); background:rgba(74,222,128,0.12); }
        .step-text h4 { font-size:13px; font-weight:500; }
        .step.active h4 { color:var(--accent-l); }
        .step.done h4 { color:var(--green); }
        .step.pending h4 { color:var(--dim); }
        .step-text p { font-size:11px; color:var(--dim); }

        /* ── Result ── */
        .video-player { width:100%; border-radius:12px; background:#000; margin-bottom:16px; }
        .result-badges { display:flex; justify-content:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
        .badge { padding:5px 12px; background:var(--surface2); border-radius:14px; font-size:11px; color:var(--dim); }
        .badge b { color:var(--text); font-weight:500; }

        /* ── Error ── */
        .error-msg { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.25); border-radius:10px; padding:12px; color:var(--red); text-align:center; font-size:13px; display:none; margin-top:12px; }
        .error-msg.show { display:block; }

        /* ── User bar ── */
        .user-bar { display:flex; align-items:center; justify-content:space-between; padding:10px 0; margin-bottom:8px; }
        .user-info { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--dim); min-width:0; }
        .user-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent-bg); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; color:var(--accent-l); font-weight:600; }
        .user-email { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .logout-btn { background:none; border:none; color:var(--dim); font-size:12px; cursor:pointer; padding:6px 10px; border-radius:6px; }
        .logout-btn:active { background:var(--surface2); }

        .spacer { flex:1; }
        .center-text { text-align:center; }
        .mt8 { margin-top:8px; }
        .mt16 { margin-top:16px; }
        .link { color:var(--accent-l); text-decoration:none; font-size:13px; }
    </style>
</head>
<body>
<div class="app">

    <!-- ===== 0. 로그인 ===== -->
    <div id="loginScreen" class="screen active">
        <div class="spacer"></div>
        <div class="brand">
            <div class="brand-icon">&#127796;</div>
            <h1>TripVideo</h1>
            <p>여행 사진을 올리면<br>AI가 영상으로 만들어드려요</p>
        </div>
        <div style="height:32px"></div>
        <div class="card">
            <div class="form-group">
                <label class="form-label">Google 계정</label>
                <input class="form-input" type="email" id="loginEmail" placeholder="example@gmail.com" inputmode="email" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label">Gemini API Key</label>
                <div class="input-wrap">
                    <input class="form-input" type="password" id="loginApiKey" placeholder="AIzaSy..." autocomplete="off" style="padding-right:44px;">
                    <button class="input-toggle" onclick="togglePw('loginApiKey')">&#128065;</button>
                </div>
                <div class="form-hint"><a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>에서 무료 발급</div>
            </div>
            <button class="btn" id="loginBtn" onclick="doLogin()">시작하기</button>
        </div>
        <div class="spacer"></div>
    </div>

    <!-- ===== 1. 업로드 ===== -->
    <div id="uploadScreen" class="screen">
        <div class="user-bar" id="userBar"></div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">&#128247;</div>
            <h3>사진/영상 선택</h3>
            <p>탭하여 사진을 선택하세요</p>
            <div class="preview-row" id="previewRow"></div>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*,video/*">
        <div style="height:12px"></div>
        <button class="btn" id="uploadBtn" onclick="startUpload()" disabled>사진을 선택하세요</button>
    </div>

    <!-- ===== 2. 여행 선택 ===== -->
    <div id="tripScreen" class="screen">
        <div class="user-bar" id="userBar2"></div>

        <!-- 분석 중 -->
        <div id="analyzingView" class="loading-view">
            <div class="spinner spinner-lg"></div>
            <p id="analyzingMsg">사진을 분석하고 있어요...</p>
        </div>

        <!-- 여행 목록 -->
        <div id="tripsView" style="display:none">
            <div class="section-title">어떤 여행을 영상으로 만들까요?</div>
            <div id="tripList"></div>

            <div class="settings">
                <div class="form-group">
                    <label class="form-label">최대 사진</label>
                    <select id="maxPhotos"><option value="10">10장</option><option value="20">20장</option><option value="30" selected>30장</option><option value="50">50장</option></select>
                </div>
                <div class="form-group">
                    <label class="form-label">사진당 시간</label>
                    <select id="duration"><option value="3">3초</option><option value="4" selected>4초</option><option value="5">5초</option><option value="6">6초</option></select>
                </div>
                <div class="form-group">
                    <label class="form-label">장소별 최대</label>
                    <select id="maxPerGroup"><option value="3">3장</option><option value="5" selected>5장</option><option value="8">8장</option><option value="10">10장</option></select>
                </div>
                <div class="form-group">
                    <label class="form-label">자막 언어</label>
                    <select id="lang"><option value="ko" selected>한국어</option><option value="en">English</option><option value="ja">日本語</option></select>
                </div>
            </div>

            <button class="btn" id="generateBtn" onclick="startGeneration()" disabled>여행을 선택하세요</button>
        </div>

        <div class="error-msg" id="tripError"></div>
    </div>

    <!-- ===== 3. 진행 ===== -->
    <div id="progressScreen" class="screen">
        <div class="user-bar" id="userBar3"></div>
        <div class="card">
            <div class="section-title">영상 만드는 중...</div>
            <div class="step pending" id="pStep1"><div class="step-dot">1</div><div class="step-text"><h4>AI 선별</h4><p>베스트 사진을 고르고 있어요</p></div></div>
            <div class="step pending" id="pStep2"><div class="step-dot">2</div><div class="step-text"><h4>자막 생성</h4><p>감성 자막을 만들고 있어요</p></div></div>
            <div class="step pending" id="pStep3"><div class="step-dot">3</div><div class="step-text"><h4>영상 렌더링</h4><p>효과 + 자막 합성 중</p></div></div>
        </div>
        <div class="error-msg" id="progressError"></div>
    </div>

    <!-- ===== 4. 결과 ===== -->
    <div id="resultScreen" class="screen">
        <div class="user-bar" id="userBar4"></div>
        <div class="section-title center-text">영상 완성!</div>
        <div style="height:8px"></div>
        <video class="video-player" id="videoPlayer" controls playsinline></video>
        <div class="result-badges" id="resultBadges"></div>
        <div class="btn-row">
            <button class="btn" onclick="downloadFile('video')">MP4 저장</button>
            <button class="btn btn-outline" onclick="downloadFile('srt')">자막 저장</button>
        </div>
        <div class="center-text mt16">
            <a href="javascript:goHome()" class="link">+ 새 영상 만들기</a>
        </div>
    </div>

</div>

<script>
// ── State ──
let user = null; // {email, apiKey}
let selectedFiles = [];
let uploadId = null;
let currentJobId = null;
let selectedTrips = new Set();

// ── Screen ──
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
}

function renderUserBar() {
    if (!user) return;
    const html = `
        <div class="user-info">
            <div class="user-avatar">${user.email[0].toUpperCase()}</div>
            <span class="user-email">${user.email}</span>
        </div>
        <button class="logout-btn" onclick="doLogout()">로그아웃</button>`;
    ['userBar','userBar2','userBar3','userBar4'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = html;
    });
}

// ── Login ──
function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const apiKey = document.getElementById('loginApiKey').value.trim();
    if (!email || !email.includes('@')) { alert('이메일을 입력해주세요.'); return; }
    if (!apiKey) { alert('Gemini API 키를 입력해주세요.'); return; }

    user = { email, apiKey };
    localStorage.setItem('tv_user', JSON.stringify(user));
    renderUserBar();
    showScreen('uploadScreen');
}

function doLogout() {
    user = null;
    localStorage.removeItem('tv_user');
    showScreen('loginScreen');
}

function goHome() {
    selectedFiles = []; uploadId = null; currentJobId = null; selectedTrips.clear();
    // Reset upload zone
    const uz = document.getElementById('uploadZone');
    uz.querySelector('.upload-icon').textContent = '\u{1F4F7}';
    uz.querySelector('h3').textContent = '사진/영상 선택';
    uz.querySelector('p').textContent = '탭하여 사진을 선택하세요';
    uz.classList.remove('has-files');
    document.getElementById('previewRow').innerHTML = '';
    document.getElementById('uploadBtn').disabled = true;
    document.getElementById('uploadBtn').textContent = '사진을 선택하세요';
    showScreen('uploadScreen');
}

// Auto-login
(function() {
    const saved = localStorage.getItem('tv_user');
    if (saved) { user = JSON.parse(saved); renderUserBar(); showScreen('uploadScreen'); }
})();

// ── PW Toggle ──
function togglePw(id) { const i = document.getElementById(id); i.type = i.type === 'password' ? 'text' : 'password'; }

// ── File select ──
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
    selectedFiles = Array.from(files);
    if (!selectedFiles.length) return;

    uploadZone.classList.add('has-files');
    uploadZone.querySelector('.upload-icon').textContent = '';
    uploadZone.querySelector('h3').innerHTML = `<span class="file-count">${selectedFiles.length}개</span> 파일 선택됨`;
    uploadZone.querySelector('p').textContent = '탭하여 다시 선택';

    const row = document.getElementById('previewRow');
    row.innerHTML = '';
    const imgs = selectedFiles.filter(f => f.type.startsWith('image/')).slice(0, 6);
    imgs.forEach(f => { const img = document.createElement('img'); img.src = URL.createObjectURL(f); row.appendChild(img); });
    const remain = selectedFiles.filter(f => f.type.startsWith('image/')).length - 6;
    if (remain > 0) { const d = document.createElement('div'); d.className='preview-more'; d.textContent=`+${remain}`; row.appendChild(d); }

    document.getElementById('uploadBtn').disabled = false;
    document.getElementById('uploadBtn').textContent = `분석 시작`;
}

// ── Upload ──
async function startUpload() {
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true; btn.textContent = '업로드 중...';

    const fd = new FormData();
    for (const f of selectedFiles) fd.append('photos', f);

    try {
        const r = await fetch('/api/upload', { method:'POST', body:fd });
        const d = await r.json();
        if (d.error) { alert(d.error); btn.disabled=false; btn.textContent='분석 시작'; return; }
        uploadId = d.upload_id;
        showScreen('tripScreen');
        document.getElementById('analyzingView').style.display = '';
        document.getElementById('tripsView').style.display = 'none';
        pollAnalyze();
    } catch(e) { alert('업로드 실패'); btn.disabled=false; btn.textContent='분석 시작'; }
}

async function pollAnalyze() {
    try {
        const d = (await (await fetch(`/api/analyze/${uploadId}`)).json());
        document.getElementById('analyzingMsg').textContent = d.message;
        if (d.status === 'ready') { renderTrips(d.trips); return; }
        if (d.status === 'error') { showErr('tripError', d.message); document.getElementById('analyzingView').style.display='none'; return; }
        setTimeout(pollAnalyze, 800);
    } catch(e) { setTimeout(pollAnalyze, 1500); }
}

function renderTrips(trips) {
    document.getElementById('analyzingView').style.display = 'none';
    document.getElementById('tripsView').style.display = '';
    const list = document.getElementById('tripList');
    list.innerHTML = '';
    selectedTrips.clear();

    trips.forEach(t => {
        const card = document.createElement('div');
        card.className = 'trip-card';
        card.onclick = () => { toggleTrip(t.id, card); };
        const thumbHtml = t.thumbnail
            ? `<img class="trip-thumb" src="/api/thumbnail/${uploadId}/${t.thumbnail}" alt="">`
            : `<div class="trip-thumb-empty">&#127758;</div>`;
        card.innerHTML = `${thumbHtml}
            <div class="trip-info">
                <div class="trip-name">${t.location}</div>
                <div class="trip-meta">${t.date_range || '날짜 미상'} &middot; ${t.photo_count}장${t.video_count ? ' + '+t.video_count+'영상':''}</div>
            </div>
            <div class="trip-check">&#10003;</div>`;
        list.appendChild(card);
    });
}

function toggleTrip(id, card) {
    if (selectedTrips.has(id)) { selectedTrips.delete(id); card.classList.remove('selected'); }
    else { selectedTrips.add(id); card.classList.add('selected'); }
    const btn = document.getElementById('generateBtn');
    btn.disabled = selectedTrips.size === 0;
    btn.textContent = selectedTrips.size > 0 ? `${selectedTrips.size}개 여행 영상 만들기` : '여행을 선택하세요';
}

// ── Generate ──
async function startGeneration() {
    const btn = document.getElementById('generateBtn');
    btn.disabled=true; btn.textContent='시작 중...';
    try {
        const r = await fetch('/api/generate', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                upload_id: uploadId, selected_trips: Array.from(selectedTrips),
                max_photos: +document.getElementById('maxPhotos').value,
                max_per_group: +document.getElementById('maxPerGroup').value,
                duration: +document.getElementById('duration').value,
                lang: document.getElementById('lang').value,
                api_key: user ? user.apiKey : '',
            })
        });
        const d = await r.json();
        if (d.error) { alert(d.error); btn.disabled=false; btn.textContent=`${selectedTrips.size}개 여행 영상 만들기`; return; }
        currentJobId = d.job_id;
        showScreen('progressScreen');
        // reset steps
        for(let i=1;i<=3;i++){const s=document.getElementById(`pStep${i}`);s.className='step pending';s.querySelector('.step-dot').textContent=i;}
        pollProgress();
    } catch(e) { alert('요청 실패'); btn.disabled=false; }
}

async function pollProgress() {
    try {
        const d = (await (await fetch(`/api/status/${currentJobId}`)).json());
        const step = d.step || 0;
        for(let i=1;i<=3;i++){
            const s=document.getElementById(`pStep${i}`);
            if(i<step){s.className='step done';s.querySelector('.step-dot').textContent='\u2713';}
            else if(i===step){s.className='step active';s.querySelector('.step-dot').innerHTML='<div class="spinner"></div>';}
            else{s.className='step pending';s.querySelector('.step-dot').textContent=i;}
        }
        if(d.status==='done'){showResult(d);return;}
        if(d.status==='error'){showErr('progressError',d.message);return;}
        setTimeout(pollProgress,1000);
    } catch(e){setTimeout(pollProgress,2000);}
}

function showResult(job) {
    showScreen('resultScreen');
    const p = document.getElementById('videoPlayer'); p.src=`/video/${currentJobId}`;
    const b = document.getElementById('resultBadges'); let h='';
    if(job.total_files) h+=`<div class="badge">원본 <b>${job.total_files}개</b></div>`;
    if(job.selected_count) h+=`<div class="badge">선별 <b>${job.selected_count}개</b></div>`;
    if(job.total_groups) h+=`<div class="badge">장소 <b>${job.total_groups}곳</b></div>`;
    b.innerHTML=h;
}

function downloadFile(t) { if(currentJobId) window.location.href=`/api/download/${currentJobId}/${t}`; }
function showErr(id,msg) { const e=document.getElementById(id); e.textContent=msg; e.classList.add('show'); }
</script>
