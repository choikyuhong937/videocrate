<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조기축구 감독실 ⚽</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 헤더 -->
  <header>
    <div class="header-inner">
      <div class="logo">⚽ 조기축구 감독실</div>
      <nav>
        <button class="nav-btn active" onclick="showPage('roster')">선수 명단</button>
        <button class="nav-btn" onclick="showPage('match')">오늘 경기</button>
        <button class="nav-btn" onclick="showPage('settings')">설정</button>
      </nav>
    </div>
  </header>

  <main>

    <!-- ============ 페이지: 선수 명단 ============ -->
    <section id="page-roster" class="page active">
      <div class="section-header">
        <h2>선수 명단 관리</h2>
        <button class="btn-primary" onclick="openAddPlayerModal()">+ 선수 추가</button>
      </div>
      <div id="player-list" class="player-grid">
        <div class="empty-state">선수를 추가해주세요.</div>
      </div>
    </section>

    <!-- ============ 페이지: 오늘 경기 ============ -->
    <section id="page-match" class="page">
      <div class="section-header">
        <h2>오늘 경기 선수 선택</h2>
        <span class="selected-count" id="selected-count">0명 선택됨</span>
      </div>
      <p class="hint">오늘 출전 가능한 선수들을 선택해주세요. (최소 7명 ~ 최대 11명 권장)</p>
      <div id="match-player-list" class="player-grid selectable"></div>

      <div class="tactics-controls">
        <div class="form-group">
          <label>경기 스타일 희망</label>
          <select id="preferred-style">
            <option value="균형">균형잡힌 플레이</option>
            <option value="공격">공격적 플레이</option>
            <option value="수비">수비적 플레이</option>
            <option value="점유">점유율 중심</option>
            <option value="역습">빠른 역습</option>
          </select>
        </div>
        <div class="form-group">
          <label>상대팀 수준</label>
          <select id="opponent-level">
            <option value="비슷">비슷한 수준</option>
            <option value="강함">우리보다 강함</option>
            <option value="약함">우리보다 약함</option>
          </select>
        </div>
        <button class="btn-primary btn-large" onclick="getTacticsFromAI()">
          🤖 AI 전술 추천 받기
        </button>
      </div>

      <!-- AI 결과 -->
      <div id="ai-result" class="ai-result hidden">
        <div class="ai-result-header">
          <h3>🎯 AI 전술 분석 결과</h3>
        </div>
        <div id="ai-result-content"></div>
      </div>
    </section>

    <!-- ============ 페이지: 설정 ============ -->
    <section id="page-settings" class="page">
      <h2>설정</h2>
      <div class="settings-card">
        <h3>🔑 Gemini API 키</h3>
        <p class="hint">Google AI Studio에서 발급받은 API 키를 입력하세요.</p>
        <div class="input-row">
          <input type="password" id="api-key-input" placeholder="AIza..." />
          <button class="btn-primary" onclick="saveApiKey()">저장</button>
        </div>
        <p id="api-key-status" class="status-text"></p>
      </div>
      <div class="settings-card">
        <h3>⚠️ 데이터 초기화</h3>
        <p class="hint">저장된 선수 명단을 모두 삭제합니다.</p>
        <button class="btn-danger" onclick="clearAllData()">전체 초기화</button>
      </div>
    </section>

  </main>

  <!-- ============ 선수 추가/수정 모달 ============ -->
  <div id="player-modal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">선수 추가</h3>
        <button class="modal-close" onclick="closePlayerModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="modal-player-id" />

        <div class="form-row">
          <div class="form-group">
            <label>이름 *</label>
            <input type="text" id="modal-name" placeholder="홍길동" />
          </div>
          <div class="form-group">
            <label>등번호</label>
            <input type="number" id="modal-number" placeholder="10" min="1" max="99" />
          </div>
        </div>

        <div class="form-group">
          <label>포지션 선호도 *</label>
          <div class="position-picker" id="position-picker">
            <button type="button" class="pos-btn" data-pos="GK">GK</button>
            <button type="button" class="pos-btn" data-pos="CB">CB</button>
            <button type="button" class="pos-btn" data-pos="SB">SB</button>
            <button type="button" class="pos-btn" data-pos="CM">CM</button>
            <button type="button" class="pos-btn" data-pos="WM">LM/RM</button>
            <button type="button" class="pos-btn" data-pos="FW">FW</button>
          </div>
        </div>

        <div class="form-group">
          <label>실력 수준</label>
          <div class="level-picker" id="level-picker">
            <button type="button" class="level-btn" data-level="초급">초급 🌱</button>
            <button type="button" class="level-btn active" data-level="중급">중급 ⚽</button>
            <button type="button" class="level-btn" data-level="고급">고급 🌟</button>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>스피드</label>
            <select id="modal-speed">
              <option value="빠름">빠름</option>
              <option value="보통" selected>보통</option>
              <option value="느림">느림</option>
            </select>
          </div>
          <div class="form-group">
            <label>체력</label>
            <select id="modal-stamina">
              <option value="좋음">좋음</option>
              <option value="보통" selected>보통</option>
              <option value="약함">약함</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>플레이 성향</label>
          <div class="tag-picker" id="style-picker">
            <button type="button" class="tag-btn" data-val="공격적">공격적</button>
            <button type="button" class="tag-btn" data-val="수비적">수비적</button>
            <button type="button" class="tag-btn" data-val="균형형">균형형</button>
            <button type="button" class="tag-btn" data-val="기술파">기술파</button>
            <button type="button" class="tag-btn" data-val="피지컬파">피지컬파</button>
            <button type="button" class="tag-btn" data-val="적극적">적극적</button>
            <button type="button" class="tag-btn" data-val="소극적">소극적</button>
          </div>
        </div>

        <div class="form-group">
          <label>특기 (복수 선택 가능)</label>
          <div class="tag-picker" id="skill-picker">
            <button type="button" class="tag-btn" data-val="슛">슛</button>
            <button type="button" class="tag-btn" data-val="패스">패스</button>
            <button type="button" class="tag-btn" data-val="드리블">드리블</button>
            <button type="button" class="tag-btn" data-val="헤딩">헤딩</button>
            <button type="button" class="tag-btn" data-val="수비">수비</button>
            <button type="button" class="tag-btn" data-val="스피드">스피드</button>
            <button type="button" class="tag-btn" data-val="체력">체력</button>
            <button type="button" class="tag-btn" data-val="위치선정">위치선정</button>
          </div>
        </div>

        <div class="form-group">
          <label>메모</label>
          <textarea id="modal-note" placeholder="부상 이력, 특이사항 등..." rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closePlayerModal()">취소</button>
        <button class="btn-primary" onclick="savePlayer()">저장</button>
      </div>
    </div>
  </div>

  <!-- 로딩 오버레이 -->
  <div id="loading-overlay" class="modal-overlay hidden">
    <div class="loading-box">
      <div class="spinner"></div>
      <p>AI가 전술을 분석 중입니다...</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
